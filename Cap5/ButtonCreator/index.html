<!DOCTYPE html>
<html lang="PT-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button Creator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="creator">
        <form action="" name="creator" id="controles">
            <p>
                <label for="texto">texto</label>
                <input type="text" name="texto" id="texto" size="15">
            </p>
            <p>
                <label for="color">color</label>
                <input type="color" name="color" id="color">
            </p>
            <p>
                <label for="backgroundColor">background-color</label>
                <input type="color" name="backgroundColor" id="backgroundColor">
            </p>
            <p>
                <label for="height">height</label>
                <input type="range" name="height" id="height" max="200">
            </p>
            <p>
                <label for="width">width</label>
                <input type="range" name="width" id="width" max="600">
            </p>
            <p>
                <label for="border">border</label>
                <input type="text" name="border" id="border" size="15">
            </p>
            <p>
                <label for="borderRadius">border-radius</label>
                <input type="range" name="borderRadius" id="borderRadius" max="20">
            </p>
            <p>
                <select name="fontFamily" id="fontFamily">
                    <option value="Arial">Arial</option>
                    <option value="monospace">Monospace</option>
                    <option value="Georgia">Georgia</option>
                </select>
            </p>
            <p>
                <label for="fontSize">font-size</label>
                <input type="number" name="fontSize" id="fontSize" max="20" size="15">
            </p>
        </form>
        <section class="resultado">
            <button class="btn">Clique</button>
            <pre>
                <code class="css">
                    <span>background-color: #ef4b1a</span>
                </code>
            </pre>
        </section>
    </section>
</body>
    <script src="script.js"></script>
</html>
